<script>
function init(){
if(!localStorage.horaires) localStorage.horaires="Lundi-Vendredi 8h30-19h30 | Samedi 9h-18h";
if(!localStorage.info) localStorage.info="Bienvenue dans votre pharmacie.";
if(!localStorage.images) localStorage.images="";
render();
}

function render(){
document.getElementById("horaires").innerText=localStorage.horaires;
document.getElementById("info").innerText=localStorage.info;
let html="";
localStorage.images.split("\n").forEach(url=>{ if(url.trim()) html+=`<img src="${url}">`; });
document.getElementById("gallery").innerHTML=html;
}

function openLogin(){ loginBox.classList.remove("hidden"); }

function login(){
if(user.value==="admin" && pass.value==="Pharmacie74290!"){
loginBox.classList.add("hidden");
adminPanel.classList.remove("hidden");
editHoraires.value=localStorage.horaires;
editInfo.value=localStorage.info;
editImages.value=localStorage.images;
} else alert("Erreur");
}

function save(){
localStorage.horaires=editHoraires.value;
localStorage.info=editInfo.value;
localStorage.images=editImages.value;
render();
alert("Sauvegardé");
}

function logout(){ adminPanel.classList.add("hidden"); }

init();
</script>
